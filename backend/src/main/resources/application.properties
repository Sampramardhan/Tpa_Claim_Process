spring.application.name=tpa-claim-process-api

# Dotenv Configuration for local development
# Points to the root directory containing the .env file relative to the 'backend/' subdirectory
springdotenv.directory=../

server.port=${SERVER_PORT}
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=${SPRING_JPA_DEFAULT_SCHEMA}

spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:15MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:30MB}

tpa.api.version=${TPA_API_VERSION:v1}
tpa.api.title=${TPA_API_TITLE:TPA Claim Processing API}
tpa.storage.upload-dir=${TPA_STORAGE_UPLOAD_DIR:uploads}

tpa.security.jwt.secret=${TPA_JWT_SECRET}
tpa.security.jwt.issuer=${TPA_JWT_ISSUER:tpa-claim-process}
tpa.security.jwt.expiration-minutes=${TPA_JWT_EXPIRATION_MINUTES:120}
tpa.security.cors.allowed-origins=${TPA_CORS_ALLOWED_ORIGINS}

tpa.security.static-logins.client.email=${TPA_STATIC_CLIENT_EMAIL}
tpa.security.static-logins.client.password=${TPA_STATIC_CLIENT_PASSWORD}
tpa.security.static-logins.client.password-hash=${TPA_STATIC_CLIENT_PASSWORD_HASH:}
tpa.security.static-logins.fmg.email=${TPA_STATIC_FMG_EMAIL}
tpa.security.static-logins.fmg.password=${TPA_STATIC_FMG_PASSWORD}
tpa.security.static-logins.fmg.password-hash=${TPA_STATIC_FMG_PASSWORD_HASH:}
tpa.security.static-logins.carrier.email=${TPA_STATIC_CARRIER_EMAIL}
tpa.security.static-logins.carrier.password=${TPA_STATIC_CARRIER_PASSWORD}
tpa.security.static-logins.carrier.password-hash=${TPA_STATIC_CARRIER_PASSWORD_HASH:}

# Google AI OCR Configuration
tpa.google.ai.api-key=${GOOGLE_AI_API_KEY}

tpa.google.ai.base-url=${GOOGLE_AI_BASE_URL}
tpa.google.ai.model=${GOOGLE_AI_MODEL}
