spring.application.name=tpa-claim-process-api

server.port=${SERVER_PORT:8080}
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/api/v1}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tpa_claims}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:tpa_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:tpa_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=${SPRING_JPA_DEFAULT_SCHEMA:claim_schema}

spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}

tpa.api.version=${TPA_API_VERSION:v1}
tpa.api.title=${TPA_API_TITLE:TPA Claim Processing API}

tpa.security.jwt.secret=${TPA_JWT_SECRET:local-development-jwt-secret-change-before-production-1234567890}
tpa.security.jwt.issuer=${TPA_JWT_ISSUER:tpa-claim-process}
tpa.security.jwt.expiration-minutes=${TPA_JWT_EXPIRATION_MINUTES:120}
tpa.security.cors.allowed-origins=${TPA_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175}

tpa.security.static-logins.client.email=${TPA_STATIC_CLIENT_EMAIL:client@tpa.local}
tpa.security.static-logins.client.password=${TPA_STATIC_CLIENT_PASSWORD:ClientDev@12345}
tpa.security.static-logins.client.password-hash=${TPA_STATIC_CLIENT_PASSWORD_HASH:}
tpa.security.static-logins.fmg.email=${TPA_STATIC_FMG_EMAIL:fmg@tpa.local}
tpa.security.static-logins.fmg.password=${TPA_STATIC_FMG_PASSWORD:FmgDev@12345}
tpa.security.static-logins.fmg.password-hash=${TPA_STATIC_FMG_PASSWORD_HASH:}
tpa.security.static-logins.carrier.email=${TPA_STATIC_CARRIER_EMAIL:carrier@tpa.local}
tpa.security.static-logins.carrier.password=${TPA_STATIC_CARRIER_PASSWORD:CarrierDev@12345}
tpa.security.static-logins.carrier.password-hash=${TPA_STATIC_CARRIER_PASSWORD_HASH:}
